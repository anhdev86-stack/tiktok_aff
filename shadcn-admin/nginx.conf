# Static SPA + security headers + gzip
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    server_tokens off;
    client_max_body_size 1m;

    # ----- Security headers — đặt ở server level + always để áp cho mọi response.
    # Lưu ý: add_header trong location con sẽ override toàn bộ headers cha,
    # nên các location con không gọi thêm add_header — chỉ dùng expires/Cache-Control
    # qua expires directive.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Google Fonts: cho phép style-src https://fonts.googleapis.com và
    # font-src https://fonts.gstatic.com. Các domain khác vẫn bị chặn.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'" always;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/xml application/wasm;

    # Health check
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # FE gọi trực tiếp api.bcao.vn (absolute URL nướng vào bundle qua VITE_API_URL).
    # Không reverse-proxy /api/ ở nginx này → không cần resolve service name nội bộ.
    # Local dev: dùng nginx.local.conf (build arg NGINX_CONF=nginx.local.conf).

    # Cache hashed asset bundles "forever"
    location /assets/ {
        access_log off;
        expires 1y;
        try_files $uri =404;
    }

    # index.html không cache (luôn bắt bản mới)
    location = /index.html {
        expires -1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
