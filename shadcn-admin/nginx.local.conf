# Local-dev only: copy của nginx.conf + thêm reverse proxy /api/ → service "api".
# Prod KHÔNG dùng file này. Bundle prod build với VITE_API_URL absolute trỏ api.bcao.vn,
# browser gọi thẳng api domain, không qua nginx FE → không cần proxy block.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    server_tokens off;
    client_max_body_size 1m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'" always;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/xml application/wasm;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Reverse proxy /api/ → service "api:3000" trong cùng compose network.
    # `resolver` Docker internal DNS (127.0.0.11) + biến để defer DNS lookup.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_api api;
        proxy_pass http://$upstream_api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        access_log off;
        expires 1y;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
