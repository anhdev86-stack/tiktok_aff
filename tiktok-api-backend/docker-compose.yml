# docker-compose chạy từ thư mục tiktok-api-backend/
# Build context set lên thư mục cha để copy SDK từ api-test/.
#
# BẢO MẬT:
# - Cả mongo và api đều bind vào 127.0.0.1 → chỉ host truy cập được, không expose ra network ngoài.
# - Mongo bật auth (root user/pass). API kết nối qua MONGO_URI có credential.
# - SA Google không còn mount file — admin upload qua UI, lưu encrypted ở DB.
# - ENCRYPTION_KEY (32 bytes hex) bắt buộc — dùng để mã hoá private_key của SA.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--bind_ip_all", "--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}"
      MONGO_INITDB_DATABASE: "${MONGO_DB:-tiktok_api}"
    ports:
      # Bind localhost only — không cho phép remote access. Ai muốn truy cập từ
      # ngoài phải qua SSH tunnel hoặc reverse proxy có TLS.
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "-u"
        - "${MONGO_ROOT_USERNAME:-root}"
        - "-p"
        - "${MONGO_ROOT_PASSWORD}"
        - "--authenticationDatabase"
        - "admin"
        - "--eval"
        - "db.runCommand({ ping: 1 }).ok"
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: tiktok-api-backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      GLOBAL_PREFIX: "api/v1"
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-tiktok_api}?authSource=admin"
      MONGO_DB: "${MONGO_DB:-tiktok_api}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:-}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required (>=32 chars)}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-12h}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars)}"
      CORS_ORIGINS: "${CORS_ORIGINS:-}"
      RATE_LIMIT_GLOBAL: "${RATE_LIMIT_GLOBAL:-100}"
      RATE_LIMIT_LOGIN: "${RATE_LIMIT_LOGIN:-5}"
      PUPPETEER_HEADLESS: "true"
      TIKTOK_DEFAULT_DELAY_MS: "${TIKTOK_DEFAULT_DELAY_MS:-3000}"
    ports:
      # Bind localhost only — đặt sau reverse proxy (nginx/caddy) có TLS để expose ra Internet.
      - "127.0.0.1:${PORT:-3000}:3000"

  web:
    build:
      context: ../shadcn-admin
      dockerfile: Dockerfile
      args:
        # Local: bundle dùng /api/v1 (relative) + nginx.local.conf reverse proxy
        # /api/ → api:3000 same-network. Prod build qua build-and-push.sh dùng
        # absolute URL + nginx.conf không proxy.
        VITE_API_URL: "${VITE_API_URL:-/api/v1}"
        NGINX_CONF: "nginx.local.conf"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      # Bind localhost — đặt sau reverse proxy có TLS (Coolify tự lo phần này).
      - "127.0.0.1:${WEB_PORT:-8080}:8080"

volumes:
  mongo_data:
